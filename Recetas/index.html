<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME</title>
    <style>

        /* Reset básico */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Estilo general */
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* Barra superior */
        .topbar{
            background-color: #ff7043;
            color: white;
            text-align: center;
            padding: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .topbar h1{
            font-size: 2rem;
        }

        /* Navegación */
        .nav-links{
            background-color: white;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-links ul{
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .nav-links a{
            text-decoration: none;
            color: #333;
            font-weight: bold;
            padding: 10px 18px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-links a:hover{
            background-color: #ff7043;
            color: white;
        }

        /* Contenido principal */
        main{
            min-height: 70vh;
            padding: 40px;
            text-align: center;
        }
        /* Footer */
        footer{
            background-color: #222;
            color: white;
            text-align: center;
            padding: 20px;
        }

        footer a{
            color: #ffb199;
            text-decoration: none;
        }

        footer a:hover{
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <section class="topbar">
        <h1 id="inicio">Sitio de Recetas</h1>
    </section>
    <header class="nav-links">
        <nav>
            <ul>
                <li>
                    <a href="index.html">HOME</a>
                </li>
                <li>
                    <a href="receta.html">Receta</a>
                </li>
                <li>
                    <a href="contacto.html">Contacto</a>
                </li>
            </ul>
        </nav>
    </header>
    
    <main>
        
    </main>
    <footer>
        <p>@Copyrigth Programación Web I - <a href="https://www.unlam.edu.ar/" target="_blank">Unlam</a> - <a href="#inicio">Ir arriba</a>
        </p>
    </footer>
</body>

</html>
